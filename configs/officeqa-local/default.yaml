_base_: ../officeqa/default.yaml

# Identical to configs/officeqa/default.yaml EXCEPT the env name is rebound
# to the local harness module under harness_example.officeqa, so harness-opt
# edits stay physically isolated from the production skillopt.envs.officeqa
# code path. See scripts/eval_only.py + scripts/train.py for the matching
# adapter registration entry.

env:
  name: officeqa-local
  skill_init: harness_example/officeqa/skills/initial.md
